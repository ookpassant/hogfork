name: Deploy prototype to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site/preview _site/prototype
          cp index.html _site/index.html
          cp preview/ships-now.html _site/preview/ships-now.html
          cp preview/vision.html _site/preview/vision.html
          cp preview/pb.html _site/preview/pb.html
          cp prototype/community-redesign.html _site/prototype/community-redesign.html
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
